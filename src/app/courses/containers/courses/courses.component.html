<mat-card>
  <mat-toolbar color="primary">
    <span>Avaiable Courses</span>
  </mat-toolbar>

  <div class="column-flex mat-elevation-z8" *ngIf="courses$ | async as courses; else loading">
    <app-courses-list
      [courses]="courses.courses"
      (add)="onAdd()"
      (edit)="onEdit($event)"
      (remove)="onRemove($event)"
    ></app-courses-list>

    <mat-paginator
      [pageSizeOptions]="[5, 10, 20]"
      [pageIndex]="pageIndex"
      [pageSize]="pageSize"
      [length]="courses.totalElements"
      (page)="refresh($event)"
      showFirstLastButtons
      aria-label="Select page of courses"
    ></mat-paginator>
  </div>

  <ng-template #loading>
    <div class="loading-spinner">
      <mat-progress-spinner
        mode="indeterminate"
        color="primary"
        [strokeWidth]="10"
      ></mat-progress-spinner>
    </div>
  </ng-template>
</mat-card>
